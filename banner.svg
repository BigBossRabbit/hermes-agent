<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="animatedGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4b0082" />
      <stop offset="50%" stop-color="#0000ff" />
      <stop offset="100%" stop-color="#4b0082" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="#0a0a0a"/>
  <rect width="1200" height="400" fill="url(#animatedGradient)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-1200,0" dur="12s" repeatCount="indefinite"/>
  </rect>
  <!-- Floating particles -->
  <g id="particles">
    <circle cx="100" cy="100" r="2" fill="#ffffff" fill-opacity="0.6">
      <animate attributeName="cx" values="100;1100;100" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;50;300;100" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.6;0.2;0.6;0.2;0.6" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="50" r="1.5" fill="#00ffff" fill-opacity="0.5">
      <animate attributeName="cx" values="300;900;300" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;350;50" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.5;0.1;0.5;0.1;0.5" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="300" r="2.5" fill="#ff00ff" fill-opacity="0.4">
      <animate attributeName="cx" values="500;200;800;500" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="300;100;300;50;300" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.4;0.1;0.4;0.1;0.4" dur="15s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="50%" y="50%" dy="0.35em" text-anchor="middle" fill="#ffffff" font-size="72" font-family="Arial, sans-serif" font-weight="bold" filter="url(#glow)">
    Hermes Agent
    <animate attributeName="fill-opacity" values="1;0.8;1;0.8;1" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>